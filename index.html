<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三國貓武將：江山對決</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        
        /* 影片背景層：確保在最底層 */
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; pointer-events: none; }
        
        /* 介面層：確保在最上層 */
        #ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; pointer-events: auto; }
        
        .hidden { display: none !important; }
        .start-btn { padding: 20px 40px; font-size: 24px; background: #d4af37; border: none; border-radius: 10px; cursor: pointer; }
        
        /* 引入你原先的 battle-container 與 select-container CSS */
        .select-container { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; width: 90%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        .character-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; margin-top: 10px; }
        .grid-item { border: 2px solid #555; cursor: pointer; background: #333; }
        .grid-item img { width: 100%; display: block; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline autoplay muted>
        <source src="https://github.com/goodtimingtrading-byte/ThreeKindomcat/raw/main/Threekindom%20cat%20opening.mp4" type="video/mp4">
    </video>

    <div id="ui-layer">
        <button id="start-btn" class="start-btn">進入遊戲 (開啟聲音)</button>

        <div id="select-screen" class="select-container hidden">
            <h2 style="color:#d4af37;">請選擇貓武將</h2>
            <div id="grid-container" class="character-grid"></div>
            <p id="system-status">等待配對...</p>
            <button id="lock-btn" disabled>確認鎖定武將</button>
        </div>

        <div id="battle-screen" class="hidden">
            </div>
    </div>

    <script>
        // 核心邏輯：點擊進入後，開啟音訊並執行 WebSocket 連線
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('bg-video');
        const selectScreen = document.getElementById('select-screen');
        const ws = new WebSocket("wss://threekindomcat.onrender.com");

        startBtn.onclick = () => {
            video.muted = false; // 解鎖影片聲音
            video.play();
            startBtn.classList.add('hidden');
            selectScreen.classList.remove('hidden');
            initGameUI();
        };

        function initGameUI() {
            const cats = ["LuBu", "KuanYu", "ChangFei", "ZhangYun", "TsaoTsao", "LiuBe", "KongMin", "ChoYou", "SiMaYi", "SunTsu"];
            const grid = document.getElementById('grid-container');
            
            cats.forEach(name => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `<img src="https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/${name}.png">`;
                div.onclick = () => {
                    document.querySelectorAll('.grid-item').forEach(i => i.style.borderColor = '#555');
                    div.style.borderColor = '#d4af37';
                    document.getElementById('lock-btn').disabled = false;
                    ws.send(JSON.stringify({ type: 'SELECT', char: name }));
                };
                grid.appendChild(div);
            });
        }
        
        // 這裡延續你原本穩定的 WebSocket 處理與戰鬥 logic
    </script>
</body>
</html>
