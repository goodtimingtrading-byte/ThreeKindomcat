<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三國貓對戰 - AI 訓練場</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #2c3e50; color: white; padding: 20px; }
        #webcam-container { margin: 20px auto; border: 5px solid #ecf0f1; border-radius: 15px; width: 200px; height: 200px; overflow: hidden; }
        .battle-area { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .hand-slot { width: 120px; height: 120px; border: 3px dashed #bdc3c7; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.1); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; }
        #status { margin: 15px; font-size: 1.2rem; color: #f1c40f; }
    </style>
</head>
<body>

    <h1>三國貓對戰：AI 手勢辨識中</h1>
    <button onclick="init()">啟動 AI 鏡頭</button>
    <div id="status">請按下按鈕以啟用攝影機</div>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <div class="battle-area">
        <div id="hand-1" class="hand-slot">第 1 回合</div>
        <div id="hand-2" class="hand-slot">第 2 回合</div>
        <div id="hand-3" class="hand-slot">第 3 回合</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // 核心設定：確保資料夾名稱為 my_model
        const URL = "./my_model/";
        let model, webcam, labelContainer, maxPredictions;
        let playerHands = [];

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                webcam = new tmImage.Webcam(200, 200, true);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                document.getElementById("status").innerHTML = "正在辨識手勢... 請做出剪刀、石頭或布";
            } catch (err) {
                alert("無法讀取模型，請檢查 my_model 資料夾是否存在正確檔案。");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let best = prediction.reduce((prev, current) => (prev.probability > current.probability) ? prev : current);

            // 當準確率超過 95% 且未滿 3 回合時自動記錄
            if (best.probability > 0.95 && playerHands.length < 3) {
                let turn = playerHands.length + 1;
                playerHands.push(best.className);
                document.getElementById(`hand-${turn}`).innerText = best.className;
                
                // 暫停 2 秒，避免重複錄入同一回合
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
        }
    </script>
</body>
</html>
