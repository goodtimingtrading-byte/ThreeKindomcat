<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三國貓武將：江山對決連線版</title>
    <style>
        /* 嚴格限制單螢幕不捲動，適配平板與電腦 */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding: 5px;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
        }

        h1 { color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 18px; margin: 2px 0; }
        p#system-status { margin: 2px 0 4px 0; font-size: 12px; color: #ffcc00; }
        .hidden { display: none !important; }

        /* ================= 階段一：選角畫面 ================= */
        .select-container { display: flex; flex-direction: column; align-items: center; width: 95%; max-width: 900px; gap: 8px; height: calc(100vh - 40px); justify-content: center;}
        .preview-zone { display: flex; justify-content: space-between; width: 100%; height: 180px; gap: 15px; }
        .player-box { flex: 1; background: #222; border: 2px solid #444; border-radius: 8px; display: flex; padding: 8px; gap: 12px; position: relative; }
        .player-box.active-1p { border-color: #ff3e3e; box-shadow: 0 0 10px rgba(255, 62, 62, 0.4); }
        .player-box.active-2p { border-color: #3e8eff; box-shadow: 0 0 10px rgba(62, 142, 255, 0.4); }
        .big-avatar-wrapper { width: 80px; height: 142px; background: #111; border-radius: 4px; overflow: hidden; border: 1px solid #555; }
        .big-avatar { width: 100%; height: 100%; object-fit: cover; }
        .status-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .stat-row { display: flex; align-items: center; font-size: 11px; }
        .stat-label { width: 30px; color: #aaa; font-weight: bold; }
        .stat-bar-bg { flex: 1; background: #444; height: 6px; border-radius: 3px; overflow: hidden; margin: 0 6px; }
        .stat-bar-fill { height: 100%; background: #d4af37; width: 0%; transition: width 0.3s; }
        .stat-value { width: 20px; text-align: right; font-family: monospace; }
        .character-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; background: #1a1a1a; padding: 8px; border-radius: 8px; border: 2px solid #d4af37; }
        .grid-item { aspect-ratio: 1/1; background: #333; border: 2px solid #555; border-radius: 6px; cursor: pointer; overflow: hidden; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .grid-item.current-chosen { border-color: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .char-name-tag { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); text-align: center; font-size: 11px; padding: 2px 0; }
        .lock-btn { width: 160px; padding: 8px; background: #d4af37; border: none; color: #111; font-weight: bold; font-size: 13px; border-radius: 5px; cursor: pointer; }
        .lock-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }

        /* ================= 階段二：左右對戰畫面 ================= */
        .battle-container { width: 100%; max-width: 1024px; height: calc(100vh - 35px); display: flex; flex-direction: column; justify-content: space-between; }
        
        /* 橫向街機對戰大舞台（置入軍帳背景） */
        .battle-stage {
            position: relative;
            width: 100%;
            height: 52%; 
            background-image: url('https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/background.png');
            background-size: cover;
            background-position: center;
            border: 2px solid #555;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 40px;
            box-sizing: border-box;
        }

        /* 呼吸待機與受擊閃爍 */
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        @keyframes hurt-flash { 0%, 100% { opacity: 1; filter: brightness(1); } 25%, 75% { opacity: 0.3; filter: brightness(3) sepia(1) hue-rotate(-50deg) saturate(5); } }
        .animate-idle { animation: floating 2.5s ease-in-out infinite; }
        .animate-hurt { animation: hurt-flash 0.4s ease-in-out 1; }

        /* 左右角色立繪包裝 */
        .stage-char-box { width: 160px; height: 180px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 10px; }
        .stage-sprite { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.9); }
        .sprite-left { border: 4px solid #ff3e3e; }
        .sprite-right { border: 4px solid #3e8eff; transform: scaleX(-1); } /* 敵方自動翻轉面向左側 */

        /* 中間：回合制亮牌槽線 */
        .clash-arena {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            z-index: 10;
        }
        .clash-slot { width: 85px; text-align: center; font-size: 11px; color: #ccc; }

        /* 下方：垂直結構操作與資訊區（平板握持最佳化） */
        .bottom-control-zone {
            display: flex;
            justify-content: space-between;
            height: 44%;
            width: 100%;
            gap: 10px;
        }

        /* 左右兩側獨立的狀態與出牌面板 */
        .side-panel {
            flex: 1;
            background: #1e1e1e;
            border-radius: 8px;
            border: 2px solid #333;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        #p1-side-panel { border-color: #ff3e3e; }
        #p2-side-panel { border-color: #3e8eff; }

        /* 條狀資訊 */
        .bar-row { margin: 2px 0; }
        .bar-header { font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .side-hp-bar { height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #555; }
        .side-hp-fill { height: 100%; background: linear-gradient(90deg, #51ff00, #a2ff00); width: 100%; transition: width 0.4s; }
        .side-mp-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .side-mp-fill { height: 100%; background: linear-gradient(90deg, #00c6ff, #0072ff); width: 0%; transition: width 0.4s; }

        /* 迷你排組槽 */
        .mini-slots-row { display: flex; gap: 6px; justify-content: center; margin: 4px 0; }
        .mini-card-slot { width: 65px; height: 35px; background: #111; border: 1px solid #555; border-radius: 4px; text-align: center; font-size: 10px; padding-top: 2px; box-sizing: border-box; }

        /* 大招宣告按鈕 */
        .skill-toggle-btn {
            width: 100%; padding: 5px; font-weight: bold; font-size: 11px; border-radius: 4px; border: 1px solid #555; background: #333; color: #666; cursor: pointer; text-align: center;
        }
        .skill-toggle-btn.ready { background: #5c3c00; border-color: #d4af37; color: #ffcc00; }
        .skill-toggle-btn.active { background: #ff9900; border-color: #fff; color: #fff; }

        .choose-card-btn { padding: 5px 0; font-size: 12px; cursor: pointer; background: #444; border: 1px solid #666; color: white; border-radius: 4px; }
        
        /* 中間的獨立戰報 Log */
        .center-log-box {
            width: 32%;
            background: #000;
            border: 1px solid #444;
            padding: 6px;
            font-family: monospace;
            font-size: 10px;
            color: #00ff00;
            border-radius: 8px;
            overflow-y: auto;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1 id="game-title">⚔️ 三國貓武將：江山對決 ⚔️</h1>
    <p id="system-status">正在連線至雲端裁判...</p>

    <div id="select-screen" class="select-container hidden">
        <div class="preview-zone">
            <div class="player-box active-1p" id="p1-box">
                <div style="position: absolute; top: 3px; left: 8px; color: #ff3e3e; font-weight: bold; font-size:11px;">1P (你)</div>
                <div class="big-avatar-wrapper"><img id="p1-avatar" class="big-avatar" src="" alt=""></div>
                <div class="status-panel">
                    <h2 id="p1-name" style="margin: 0; color: #ff3e3e; font-size:14px;">請選擇...</h2>
                    <div class="stat-row"><span class="stat-label">統率</span><div class="stat-bar-bg"><div id="bar-len" class="stat-bar-fill"></div></div><span id="val-len" class="stat-value">-</span></div>
                    <div class="stat-row"><span class="stat-label">武力</span><div class="stat-bar-bg"><div id="bar-mus" class="stat-bar-fill"></div></div><span id="val-mus" class="stat-value">-</span></div>
                    <div class="stat-row"><span class="stat-label">智力</span><div class="stat-bar-bg"><div id="bar-int" class="stat-bar-fill"></div></div><span id="val-int" class="stat-value">-</span></div>
                </div>
            </div>
            <div class="player-box" id="p2-box">
                <div style="position: absolute; top: 3px; left: 8px; color: #3e8eff; font-weight: bold; font-size:11px;">2P (對手)</div>
                <div class="big-avatar-wrapper"><img id="p2-avatar" class="big-avatar" src="" alt=""></div>
                <div class="status-panel">
                    <h2 id="p2-name" style="margin: 0; color: #3e8eff; font-size:14px;">等待對手加入...</h2>
                </div>
            </div>
        </div>
        <div class="character-grid" id="grid-container"></div>
        <button class="lock-btn" id="lock-btn" disabled>確認鎖定武將</button>
    </div>

    <div id="battle-screen" class="battle-container hidden">
        <div class="battle-stage">
            <div class="clash-arena">
                <div class="clash-slot">1手: <span id="clash-0">? vs ?</span> <b id="res-0"></b></div>
                <div class="clash-slot">2手: <span id="clash-1">? vs ?</span> <b id="res-1"></b></div>
                <div class="clash-slot">3手: <span id="clash-2">? vs ?</span> <b id="res-2"></b></div>
            </div>
            <div class="stage-char-box"><img id="pk-hero-img" class="stage-sprite sprite-left animate-idle" src="" alt="我方"></div>
            <div class="stage-char-box"><img id="pk-enemy-img" class="stage-sprite sprite-right animate-idle" src="" alt="敵方"></div>
        </div>

        <div class="bottom-control-zone">
            <div class="side-panel" id="p1-side-panel">
                <div>
                    <div style="font-weight:bold; font-size:12px; color:#ff3e3e;" id="pk-h-name">我方貓武將</div>
                    <div class="bar-row">
                        <div class="bar-header"><span>血量 HP</span><b id="pk-h-hp-txt">100/100</b></div>
                        <div class="side-hp-bar"><div id="pk-h-hp-fill" class="side-hp-fill"></div></div>
                    </div>
                    <div class="bar-row">
                        <div class="bar-header"><span>能量 MP</span><b id="pk-h-mp-txt">0%</b></div>
                        <div class="side-mp-bar"><div id="pk-h-mp-fill" class="side-mp-fill"></div></div>
                    </div>
                </div>
                <div class="mini-slots-row">
                    <div class="mini-card-slot">1手<br><b style="color:#ffcc00;" id="slot-txt-0">未選</b></div>
                    <div class="mini-card-slot">2手<br><b style="color:#ffcc00;" id="slot-txt-1">未選</b></div>
                    <div class="mini-card-slot">3手<br><b style="color:#ffcc00;" id="slot-txt-2">未選</b></div>
                </div>
                <div style="display:flex; flex-direction:column; gap:4px;">
                    <button id="skill-toggle" class="skill-toggle-btn" onclick="toggleSkill()" disabled>特技未就緒</button>
                    <div style="display:flex; gap:4px; justify-content:center;">
                        <button class="choose-card-btn" style="flex:1;" onclick="selectMove('stone')">✊ 石頭</button>
                        <button class="choose-card-btn" style="flex:1;" onclick="selectMove('scissors')">✌️ 剪刀</button>
                        <button class="choose-card-btn" style="flex:1;" onclick="selectMove('paper')">✋ 布</button>
                    </div>
                    <button class="lock-btn" id="submit-moves-btn" style="width:100%; padding:5px; font-size:11px;" onclick="submitMoves()" disabled>鎖定排組發射</button>
                </div>
            </div>

            <div class="center-log-box" id="log-box">
                <span style="color:#ffcc00; font-weight:bold;" id="round-title">第 1 / 10 回合</span><br>
                [系統] 兩軍就位，請博弈下棋...<br>
            </div>

            <div class="side-panel" id="p2-side-panel">
                <div>
                    <div style="font-weight:bold; font-size:12px; color:#3e8eff; text-align:right;" id="pk-e-name">敵方貓武將</div>
                    <div class="bar-row">
                        <div class="bar-header"><span>血量 HP</span><b id="pk-e-hp-txt">100/100</b></div>
                        <div class="side-hp-bar"><div id="pk-e-hp-fill" class="side-hp-fill" style="background:linear-gradient(90deg, #3e8eff, #76b1ff)"></div></div>
                    </div>
                    <div class="bar-row">
                        <div class="bar-header"><span>能量 MP</span><b id="pk-e-mp-txt">0%</b></div>
                        <div class="side-mp-bar"><div id="pk-e-mp-fill" class="side-mp-fill"></div></div>
                    </div>
                </div>
                <div class="mini-slots-row">
                    <div class="mini-card-slot" style="background:#1a1a1a; border-color:#444;">1手<br><b style="color:#888;" id="op-slot-0">??</b></div>
                    <div class="mini-card-slot" style="background:#1a1a1a; border-color:#444;">2手<br><b style="color:#888;" id="op-slot-1">??</b></div>
                    <div class="mini-card-slot" style="background:#1a1a1a; border-color:#444;">3手<br><b style="color:#888;" id="op-slot-2">??</b></div>
                </div>
                <div style="display:flex; flex-direction:column; gap:4px; opacity:0.3;">
                    <button class="skill-toggle-btn" disabled>敵方特技狀態</button>
                    <div style="display:flex; gap:4px;"><button class="choose-card-btn" style="flex:1;" disabled>✊</button><button class="choose-card-btn" style="flex:1;" disabled>✌️</button><button class="choose-card-btn" style="flex:1;" disabled>✋</button></div>
                    <button class="lock-btn" style="width:100%; padding:5px; font-size:11px;" disabled>敵方決策中</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚀 連接雲端裁判網址 (請確保此網址正確)
        const ws = new WebSocket("wss://threekindomcat.onrender.com");

        let myRole = null; 
        let selectedChar = null;
        let myCurrentMoves = []; 
        let activeSlotIndex = 0; 
        let isSkillDeclared = false; 
        let canUseSkill = false;     
        let isLocked = false; // 紀錄玩家是否已按下「確認鎖定武將」

        const catsData = {
            "lubu": { name: "呂布貓", stats: [85, 100, 26], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/LuBu.png" },
            "kuanyu": { name: "關羽貓", stats: [93, 97, 75], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/KuanYu.png" },
            "changfei": { name: "張飛貓", stats: [83, 98, 33], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/ChangFei.png" },
            "zhangyun": { name: "趙雲貓", stats: [91, 96, 76], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/ZhangYun.png" },
            "tsaotsao": { name: "曹操貓", stats: [98, 72, 92], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/TsaoTsao.png" },
            "lubei": { name: "劉備貓", stats: [80, 73, 78], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/LiuBe.png" },
            "kongmin": { name: "諸葛亮貓", stats: [93, 38, 100], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/KongMin.png" },
            "choyu": { name: "周瑜貓", stats: [95, 71, 96], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/ChoYou.png" },
            "simayi": { name: "司馬懿貓", stats: [97, 63, 97], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/SiMaYi.png" },
            "suntsu": { name: "孫策貓", stats: [92, 92, 70], img: "https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/SunTsu.png" }
        };

        // 建立選角格子
        const grid = document.getElementById('grid-container');
        Object.keys(catsData).forEach(key => {
            const cat = catsData[key];
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.id = `grid-${key}`;
            div.innerHTML = `<img src="${cat.img}"><div class="char-name-tag">${cat.name}</div>`;
            
            div.addEventListener('click', () => {
                if (isLocked) return; // 一旦確認鎖定，點擊無效，防止人物中途變更

                selectedChar = key;
                
                // 點擊高亮特效
                document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('current-chosen'));
                div.classList.add('current-chosen');

                document.getElementById('p1-avatar').src = cat.img;
                document.getElementById('p1-name').innerText = cat.name;
                document.getElementById('bar-len').style.width = cat.stats[0] + '%';
                document.getElementById('bar-mus').style.width = cat.stats[1] + '%';
                document.getElementById('bar-int').style.width = cat.stats[2] + '%';
                document.getElementById('val-len').innerText = cat.stats[0];
                document.getElementById('val-mus').innerText = cat.stats[1];
                document.getElementById('val-int').innerText = cat.stats[2];
                document.getElementById('lock-btn').disabled = false;

                ws.send(JSON.stringify({ type: 'SELECT_HOVER', role: myRole, charId: key }));
            });
            grid.appendChild(div);
        });

        document.getElementById('lock-btn').addEventListener('click', () => {
            isLocked = true; 
            ws.send(JSON.stringify({ type: 'SELECT_LOCK', role: myRole, charId: selectedChar }));
            document.getElementById('lock-btn').innerText = "已鎖定，等候對手中...";
            document.getElementById('lock-btn').disabled = true;
        });

        // ================= WebSocket 連線通訊 =================
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'INIT_ROLE') {
                myRole = data.role;
                document.getElementById('system-status').innerText = `連線成功！指派為戰場 ${myRole.toUpperCase()}`;
                
                // 核心優化：當收到新身分(或對手斷線大倒帶)時，重置選角鎖定狀態
                isLocked = false;
                document.getElementById('lock-btn').innerText = "確認鎖定武將";
                document.getElementById('lock-btn').disabled = true;
                document.getElementById('p1-name').innerText = "請選擇...";
                document.getElementById('p1-avatar').src = "";
                document.getElementById('p2-name').innerText = "等待對手加入...";
                document.getElementById('p2-avatar').src = "";
                document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('current-chosen'));
                
                // 確保退回大廳畫面
                document.getElementById('select-screen').classList.remove('hidden');
                document.getElementById('battle-screen').classList.add('hidden');

                if(myRole === 'p2') {
                    document.getElementById('p1-box').children[0].innerText = "1P (對手)";
                    document.getElementById('p2-box').children[0].innerText = "2P (你)";
                } else {
                    document.getElementById('p1-box').children[0].innerText = "1P (你)";
                    document.getElementById('p2-box').children[0].innerText = "2P (對手)";
                }
            }
            if (data.type === 'SYSTEM') {
                document.getElementById('system-status').innerText = data.msg;
                
                // 如果對戰中對手突發重整斷線，後端宣告「重新等待」，強制推回選角畫面
                if (data.msg.includes('重新等待')) {
                    document.getElementById('select-screen').classList.remove('hidden');
                    document.getElementById('battle-screen').classList.add('hidden');
                    document.getElementById('game-title').innerText = "⚔️ 三國貓武將：江山對決 ⚔️";
                }
            }
            if (data.type === 'SYSTEM_READY') {
                document.getElementById('system-status').innerText = data.msg;
                document.getElementById('select-screen').classList.remove('hidden');
            }
            if (data.type === 'SELECT_HOVER' && data.role !== myRole) {
                document.getElementById('p2-avatar').src = catsData[data.charId].img;
                document.getElementById('p2-name').innerText = catsData[data.charId].name + " (考慮中)";
            }
            if (data.type === 'SELECT_LOCK' && data.role !== myRole) {
                document.getElementById('p2-avatar').src = catsData[data.charId].img;
                document.getElementById('p2-name').innerText = catsData[data.charId].name + " 🔒已選定";
            }
            
            // 雙方選定，切入對戰畫面
            if (data.type === 'START_GAME') {
                document.getElementById('select-screen').classList.add('hidden');
                document.getElementById('battle-screen').classList.remove('hidden');
                
                const heroKey = myRole === 'p1' ? data.gameState.p1.char : data.gameState.p2.char;
                const enemyKey = myRole === 'p1' ? data.gameState.p2.char : data.gameState.p1.char;
                
                document.getElementById('pk-hero-img').src = catsData[heroKey].img;
                document.getElementById('pk-enemy-img').src = catsData[enemyKey].img;
                document.getElementById('pk-h-name').innerText = catsData[heroKey].name + " (我方)";
                document.getElementById('pk-e-name').innerText = catsData[enemyKey].name + " (敵方)";

                updateUI(data.gameState);
            }
            if (data.type === 'OPPONENT_LOCKED') {
                log("[提示] 敵方軍隊已安排好出牌策略！");
                document.getElementById('op-slot-0').innerText = "已鎖";
                document.getElementById('op-slot-1').innerText = "已鎖";
                document.getElementById('op-slot-2').innerText = "已鎖";
            }
            if (data.type === 'ROUND_RESULT') {
                const mapMove = (m) => m==='stone'?'✊': m==='scissors'?'✌️':'✋';
                const myMoves = myRole === 'p1' ? data.p1Moves : data.p2Moves;
                const opMoves = myRole === 'p1' ? data.p2Moves : data.p1Moves;
                for(let i=0; i<3; i++) {
                    document.getElementById(`clash-${i}`).innerText = `${mapMove(myMoves[i])} vs ${mapMove(opMoves[i])}`;
                }

                // 受擊閃爍效果觸發
                if ((myRole === 'p1' && data.dmgToP1 > 0) || (myRole === 'p2' && data.dmgToP2 > 0)) {
                    triggerHurtAnimation('pk-hero-img');
                } else if ((myRole === 'p1' && data.dmgToP2 > 0) || (myRole === 'p2' && data.dmgToP1 > 0)) {
                    triggerHurtAnimation('pk-enemy-img');
                }

                log(`【第 ${data.gameState.round-1} 回合結果】`);
                if(data.winner === '平手') log(`⚪ 本回合雙方勢均力敵，戰平！`);
                else if((myRole === 'p1' && data.winner==='p1') || (myRole === 'p2' && data.winner==='p2')) log(`🎉 妙計得逞！我方斬獲本回合勝利！`);
                else log(`❌ 棋差一著...本回合由敵方勝出！`);

                updateUI(data.gameState);
                resetHandSlots();
            }
            if (data.type === 'GAME_OVER') {
                alert(`江山定局！${data.winnerText}`);
                location.reload();
            }
        };

        // 定時心跳包，防止 Render 免費伺服器中途自動斷開連線
        setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'PING' }));
            }
        }, 20000);

        // ================= 戰鬥出棋與大招控制 =================
        function selectMove(moveType) {
            if (activeSlotIndex > 2) return;
            myCurrentMoves[activeSlotIndex] = moveType;
            const mapText = { 'stone': '✊', 'scissors': '✌️', 'paper': '✋' };
            document.getElementById(`slot-txt-${activeSlotIndex}`).innerText = mapText[moveType];
            
            activeSlotIndex++;
            if (activeSlotIndex === 3) {
                document.getElementById('submit-moves-btn').disabled = false;
            }
        }

        function toggleSkill() {
            if (!canUseSkill) return;
            isSkillDeclared = !isSkillDeclared;
            const sBtn = document.getElementById('skill-toggle');
            if (isSkillDeclared) {
                sBtn.className = "skill-toggle-btn active";
                sBtn.innerText = "⚡ 特技宣告：發動！";
                log("[戰略] 開啟特殊技能，將與牌組同步釋放！");
            } else {
                sBtn.className = "skill-toggle-btn ready";
                sBtn.innerText = "✨ 特技就緒 (點擊發動)";
            }
        }

        function submitMoves() {
            ws.send(JSON.stringify({
                type: 'SUBMIT_MOVES',
                role: myRole,
                moves: myCurrentMoves,
                skillActive: isSkillDeclared
            }));
            document.getElementById('submit-moves-btn').innerText = "等候對手鎖定...";
            document.getElementById('submit-moves-btn').disabled = true;
        }

        function resetHandSlots() {
            myCurrentMoves = [];
            activeSlotIndex = 0;
            isSkillDeclared = false;
            document.getElementById('slot-txt-0').innerText = "未選";
            document.getElementById('slot-txt-1').innerText = "未選";
            document.getElementById('slot-txt-2').innerText = "未選";
            document.getElementById('op-slot-0').innerText = "??";
            document.getElementById('op-slot-1').innerText = "??";
            document.getElementById('op-slot-2').innerText = "??";
            document.getElementById('submit-moves-btn').innerText = "鎖定排組發射";
            document.getElementById('submit-moves-btn').disabled = true;
        }

        function updateUI(state) {
            document.getElementById('round-title').innerText = `第 ${state.round} / 10 回合`;
            
            const me = myRole === 'p1' ? state.p1 : state.p2;
            const op = myRole === 'p1' ? state.p2 : state.p1;

            document.getElementById('pk-h-hp-txt').innerText = `${me.hp}/100`;
            document.getElementById('pk-h-hp-fill').style.width = me.hp + '%';
            document.getElementById('pk-h-mp-txt').innerText = me.mp + '%';
            document.getElementById('pk-h-mp-fill').style.width = me.mp + '%';

            document.getElementById('pk-e-hp-txt').innerText = `${op.hp}/100`;
            document.getElementById('pk-e-hp-fill').style.width = op.hp + '%';
            document.getElementById('pk-e-mp-txt').innerText = op.mp + '%';
            document.getElementById('pk-e-mp-fill').style.width = op.mp + '%';

            const sBtn = document.getElementById('skill-toggle');
            if (me.mp >= 100) {
                canUseSkill = true;
                sBtn.disabled = false;
                if (!isSkillDeclared) {
                    sBtn.className = "skill-toggle-btn ready";
                    sBtn.innerText = "✨ 特技就緒 (點擊發動)";
                }
            } else {
                canUseSkill = false;
                sBtn.disabled = true;
                sBtn.className = "skill-toggle-btn";
                sBtn.innerText = `特技蓄能中 (${me.mp}%)`;
            }
        }

        function triggerHurtAnimation(imgId) {
            const el = document.getElementById(imgId);
            el.classList.remove('animate-idle');
            el.classList.add('animate-hurt');
            setTimeout(() => {
                el.classList.remove('animate-hurt');
                el.classList.add('animate-idle');
            }, 400);
        }

        function log(msg) {
            const box = document.getElementById('log-box');
            box.innerHTML += msg + "<br>";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
