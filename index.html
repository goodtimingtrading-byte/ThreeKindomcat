<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin:0; background:#2c3e50; color:white; text-align:center; }
        .scene { display:none; height:100vh; flex-direction:column; justify-content:center; }
        .active { display:flex; }
        .char-card { width:100px; cursor:pointer; }
    </style>
</head>
<body>
    <video id="video-bg" autoplay loop muted style="position:fixed; z-index:-1; width:100%; object-fit:cover;">
        <source src="https://github.com/goodtimingtrading-byte/ThreeKindomcat/blob/main/Threekindom%20cat%20opening.mp4?raw=true" type="video/mp4">
    </video>

    <div id="scene-start" class="scene active">
        <h1>三國貓對戰</h1>
        <input id="username" placeholder="輸入名稱">
        <button onclick="document.getElementById('scene-start').className='scene'; document.getElementById('scene-lobby').className='scene active';">進入大廳</button>
    </div>

    <div id="scene-lobby" class="scene">
        <div id="char-list"></div>
    </div>

    <div id="scene-battle" class="scene">
        <div id="webcam-container"></div>
        <div id="status">偵測中...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const socket = io();
        const chars = ["Lubu", "KuanYu", "LiuBei", "TsaoTsao", "KongMin", "SiMaYi", "SunTsu", "ZhangYun"];
        
        // 生成選角
        chars.forEach(c => {
            const img = document.createElement('img');
            img.src = `https://github.com/goodtimingtrading-byte/ThreeKindomcat/blob/main/${c}.png?raw=true`;
            img.className = 'char-card';
            img.onclick = () => { 
                document.getElementById('scene-lobby').className='scene';
                document.getElementById('scene-battle').className='scene active';
                initAI(); 
            };
            document.getElementById('char-list').appendChild(img);
        });

        async function initAI() {
            const model = await tmImage.load("./my_model/model.json", "./my_model/metadata.json");
            const webcam = new tmImage.Webcam(200, 200, true);
            await webcam.setup(); await webcam.play();
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            let hands = [];
            async function loop() {
                webcam.update();
                const pred = await model.predict(webcam.canvas);
                let best = pred.reduce((p, c) => (p.probability > c.probability) ? p : c);
                
                if (best.probability > 0.95 && hands.length < 3) {
                    hands.push(best.className);
                    if(hands.length === 3) socket.emit('submitHands', { hands });
                    await new Promise(r => setTimeout(r, 2000));
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
