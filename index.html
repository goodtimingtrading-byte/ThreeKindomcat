<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三國貓武將：江山對決</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 影片背景 */
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; }
        
        /* 遊戲層級 (確保永遠在影片上方) */
        #game-ui { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* 讓選角面板半透明，這樣才能看到後面的影片 */
        .select-container { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; width: 90%; max-width: 800px; margin-top: 50px; }
        
        .hidden { display: none !important; }
        .start-btn { padding: 20px 40px; font-size: 24px; background: #d4af37; border: none; border-radius: 10px; cursor: pointer; margin-top: 20%; }

        /* 戰鬥畫面微調 */
        #battle-screen { width: 100%; height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <!-- 影片背景 -->
    <video id="bg-video" loop playsinline>
        <source src="https://github.com/goodtimingtrading-byte/ThreeKindomcat/raw/refs/heads/main/Threekindom%20cat%20opening.mp4" type="video/mp4">
    </video>

    <div id="game-ui">
        <!-- 點擊進入按鈕 (解鎖聲音) -->
        <button id="start-btn" class="start-btn">進入遊戲 (開啟聲音)</button>

        <!-- 選角介面 (隱藏直到進入) -->
        <div id="select-screen" class="select-container hidden">
            <h1 style="color:#d4af37;">請選擇貓武將</h1>
            <div id="grid-container" style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px;"></div>
        </div>

        <!-- 戰鬥介面 -->
        <div id="battle-screen" class="hidden">
            <!-- 原本的戰鬥 UI 放在這裡 -->
        </div>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const startBtn = document.getElementById('start-btn');
        const selectScreen = document.getElementById('select-screen');

        // 點擊按鈕後：播放影片聲音 + 顯示選角畫面
        startBtn.addEventListener('click', () => {
            video.muted = false; // 開啟聲音
            video.play();
            startBtn.classList.add('hidden');
            selectScreen.classList.remove('hidden');
        });

        // 其餘 WebSocket 與邏輯保持不變 (請延續你原本的 JS)
        // ... (ws.onmessage, catsData 等邏輯)
    </script>
</body>
</html>
