<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>三國貓對戰</title>
    <style>
        body, html { margin:0; width:100%; height:100%; overflow:hidden; background:#000; color:#fff; }
        .scene { display:none; width:100vw; height:100vh; position:absolute; flex-direction:column; align-items:center; justify-content:center; }
        .active { display:flex; }
        h1 { font-size: 5rem; }
        input { font-size: 3rem; width:500px; padding:20px; }
        button { font-size: 2.5rem; padding:20px 40px; cursor:pointer; }
        .char-card { width:150px; height:150px; border:5px solid #fff; cursor:pointer; }
        #battle-field { display:flex; justify-content:space-between; width:90%; align-items:center; }
        .side { width:40%; text-align:center; background:rgba(0,0,0,0.5); padding:20px; }
    </style>
</head>
<body>
    <div id="scene-start" class="scene active">
        <video id="video-bg" autoplay loop muted playsinline style="position:fixed; width:100%; height:100%; object-fit:cover; z-index:-1;">
            <source src="https://github.com/goodtimingtrading-byte/ThreeKindomcat/blob/main/Threekindom%20cat%20opening.mp4?raw=true" type="video/mp4">
        </video>
        <h1>三國貓對戰</h1>
        <input id="username" placeholder="輸入名稱">
        <button onclick="enterLobby()">進入大廳</button>
    </div>

    <div id="scene-lobby" class="scene">
        <h2>選擇武將</h2>
        <div id="char-list"></div>
    </div>

    <div id="scene-battle" class="scene">
        <div id="battle-field">
            <div class="side">
                <img id="p1-char" style="width:200px; height:200px;">
                <div id="webcam-container"></div>
                <button onclick="submitMove('Rock')">石頭</button>
                <button onclick="submitMove('Paper')">布</button>
                <button onclick="submitMove('Scissor')">剪刀</button>
            </div>
            <div class="side"><h3>敵方</h3></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const socket = io("https://threekindomcat.onrender.com");
        function enterLobby() {
            document.getElementById('scene-start').className = 'scene';
            document.getElementById('scene-lobby').className = 'scene active';
            renderChars();
        }
        function renderChars() {
            ["Lubu", "KuanYu", "LiuBei", "TsaoTsao"].forEach(c => {
                const img = document.createElement('img');
                img.src = `https://github.com/goodtimingtrading-byte/ThreeKindomcat/blob/main/${c}.png?raw=true`;
                img.className = 'char-card';
                img.onclick = () => {
                    document.getElementById('p1-char').src = img.src;
                    document.getElementById('scene-lobby').className = 'scene';
                    document.getElementById('scene-battle').className = 'scene active';
                };
                document.getElementById('char-list').appendChild(img);
            });
        }
        function submitMove(m) { socket.emit('submitHands', { roomId: 'room1', hands: [m] }); }
    </script>
</body>
</html>
