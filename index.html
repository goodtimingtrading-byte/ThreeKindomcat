<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三國貓武將：江山對決連線版</title>
    <style>
        body { margin: 0; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; color: white; }
        
        /* 影片背景層 */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1;
        }

        /* 統一介面佈局 */
        .container { display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: flex-start; }
        .hidden { display: none !important; }

        /* 選角介面 (透明化以顯示背景影片) */
        .select-container { width: 95%; max-width: 900px; height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .character-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; }
        
        /* 戰鬥介面 (移除靜態背景圖，改用影片透明層) */
        .battle-stage { position: relative; width: 100%; height: 50%; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 40px; box-sizing: border-box; }
        
        /* (其餘戰鬥介面 CSS 與你之前設定的一致，請保留你原有的設定) */
        /* ... 此處維持你原先的 .side-panel, .clash-arena 等 CSS ... */
    </style>
</head>
<body>

    <!-- 🎥 動態背景影片 -->
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://github.com/goodtimingtrading-byte/ThreeKindomcat/raw/refs/heads/main/Threekindom%20cat%20opening.mp4" type="video/mp4">
    </video>

    <!-- 介面內容與你之前的程式碼相同 (只需修改 CSS 背景部分) -->
    <div id="select-screen" class="container">
        <!-- 選角內容... -->
    </div>

    <script>
        // 🎵 戰鬥專屬 BGM (維持原狀，切入戰鬥才播放)
        const audioBattle = new Audio("https://github.com/goodtimingtrading-byte/ThreeKindomcat/raw/refs/heads/main/Jade_and_Iron.mp3");
        audioBattle.loop = true;
        audioBattle.volume = 0.5;

        // WebSocket 邏輯 (維持原狀)...
        // 在 START_GAME 階段呼叫 audioBattle.play()
    </script>
</body>
</html>
