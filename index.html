<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>三國貓武將：完整對戰版</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        #bg-video { position: fixed; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; }
        #ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(5, 120px); gap: 10px; margin-top: 50px; }
        .item { width: 120px; height: 120px; border: 2px solid #555; cursor: pointer; background: #222; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none !important; }
        /* 戰鬥介面容器 */
        #battle-ui { width: 90%; height: 80vh; background: rgba(0,0,0,0.8); padding: 20px; margin-top: 50px; border-radius: 10px; }
    </style>
</head>
<body>
    <video id="bg-video" loop playsinline autoplay muted>
        <source src="https://github.com/goodtimingtrading-byte/ThreeKindomcat/raw/main/Threekindom%20cat%20opening.mp4" type="video/mp4">
    </video>
    <div id="ui-layer">
        <button id="start-btn" style="padding:20px; margin-top:200px;">進入遊戲</button>
        <div id="select-screen" class="hidden">
            <div id="grid" class="grid"></div>
            <button id="lock-btn" disabled>確認鎖定</button>
        </div>
        <div id="battle-ui" class="hidden">
            <h1>戰鬥中...</h1>
            <div id="status-log">等待指令...</div>
        </div>
    </div>
    <script>
        const ws = new WebSocket("wss://threekindomcat.onrender.com");
        const cats = ["LuBu", "KuanYu", "ChangFei", "ZhangYun", "TsaoTsao", "LiuBe", "KongMin", "ChoYou", "SiMaYi", "SunTsu"];
        let selected = null;

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('bg-video').muted = false;
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('select-screen').classList.remove('hidden');
        };

        cats.forEach(n => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<img src="https://raw.githubusercontent.com/goodtimingtrading-byte/ThreeKindomcat/main/${n}.png">`;
            div.onclick = () => { selected = n; document.getElementById('lock-btn').disabled = false; };
            document.getElementById('grid').appendChild(div);
        });

        document.getElementById('lock-btn').onclick = () => {
            ws.send(JSON.stringify({ type: 'lock', char: selected }));
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.type === 'lock') {
                document.getElementById('select-screen').classList.add('hidden');
                document.getElementById('battle-ui').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
